<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <title>VerticalParts — Portfólio</title>
  <style>
    /* ─────────────────────────────────────────────────
       DESIGN TOKENS
       Palette: near-black / industrial neutral
       ground:    #070707
       text:      #F0EDE8
       accent:    #F5C400  (VP gold)
       muted:     #C8C4BC
       ───────────────────────────────────────────────── */
    :root {
      --ground:  #070707;
      --text:    #F0EDE8;
      --accent:  #F5C400;
      --muted:   #C8C4BC;

      /* Derived */
      --accent-dim:  rgba(245, 196, 0, 0.12);
      --accent-ring: rgba(245, 196, 0, 0.30);
      --white-55:    rgba(240, 237, 232, 0.55);
      --white-30:    rgba(240, 237, 232, 0.30);
      --white-10:    rgba(240, 237, 232, 0.10);
      --black-90:    rgba(7, 7, 7, 0.90);
      --black-45:    rgba(7, 7, 7, 0.45);
      --black-10:    rgba(7, 7, 7, 0.10);
      --black-30:    rgba(7, 7, 7, 0.30);
    }

    /* ─────────────────────────────────────────────────
       RESET & BASE
       ───────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      margin: 0; padding: 0;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: var(--text);
      touch-action: none;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─────────────────────────────────────────────────
       STAGE — 9:16 totem viewport centered on screen
       ───────────────────────────────────────────────── */
    #stage {
      width:  min(100vw, calc(100vh * 9 / 16));
      height: min(100vh, calc(100vw * 16 / 9));
      aspect-ratio: 9 / 16;
      background: var(--ground);
      position: relative;
      overflow: hidden;
      touch-action: none;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.05),
        0 0 80px rgba(0,0,0,0.8);
    }

    /* ─────────────────────────────────────────────────
       HOME SCREEN
       ───────────────────────────────────────────────── */
    #home {
      position: absolute;
      inset: 0;
      /* Rich dark base — warm near-black, not sterile */
      background: #06050A;
      display: flex;
      flex-direction: column;
      z-index: 20;
      transition: opacity 0.55s ease, transform 0.55s ease;
      will-change: opacity, transform;
      overflow: hidden;
    }

    #home.exiting {
      opacity: 0;
      transform: scale(1.04);
      pointer-events: none;
    }

    #home.hidden {
      display: none;
    }

    /* ── Atmospheric depth layers ── */

    /* Primary gold bloom — top-right, large, soft */
    .h-orb-a {
      position: absolute;
      width: 140%; aspect-ratio: 1;
      border-radius: 50%;
      top: -55%; right: -40%;
      background: radial-gradient(circle at center,
        rgba(245,196,0,0.13) 0%,
        rgba(245,196,0,0.04) 40%,
        transparent 68%);
      pointer-events: none; z-index: 0;
    }

    /* Secondary bloom — bottom-left, cooler */
    .h-orb-b {
      position: absolute;
      width: 90%; aspect-ratio: 1;
      border-radius: 50%;
      bottom: -30%; left: -25%;
      background: radial-gradient(circle at center,
        rgba(245,196,0,0.07) 0%,
        rgba(180,120,0,0.03) 45%,
        transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* Decorative ring 1 — large, top-right, partially cropped */
    .h-ring-1 {
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      top: -180px; right: -180px;
      border: 1px solid rgba(245,196,0,0.09);
      pointer-events: none; z-index: 0;
    }

    /* Decorative ring 2 — inner, same axis */
    .h-ring-2 {
      position: absolute;
      width: 380px; height: 380px;
      border-radius: 50%;
      top: -70px; right: -90px;
      border: 1px solid rgba(245,196,0,0.13);
      pointer-events: none; z-index: 0;
    }

    /* Decorative ring 3 — accent dot, bottom-left */
    .h-ring-3 {
      position: absolute;
      width: 220px; height: 220px;
      border-radius: 50%;
      bottom: 100px; left: -80px;
      border: 1px solid rgba(245,196,0,0.07);
      pointer-events: none; z-index: 0;
    }

    /* Subtle horizontal grain across center for depth */
    .h-grain {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 100% 30% at 50% 48%,
          rgba(245,196,0,0.04) 0%, transparent 100%);
      pointer-events: none; z-index: 0;
    }

    /* Bottom gradient fade — so CTA button bleeds into design */
    .h-fade-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 260px;
      background: linear-gradient(to bottom,
        transparent 0%,
        rgba(6,5,10,0.7) 50%,
        rgba(6,5,10,1) 100%);
      pointer-events: none; z-index: 0;
    }

    .home-inner {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 52px;
    }

    /* Ghost "11" — rendered as a large hollow circle outline for elegance */
    .home-ghost {
      position: absolute;
      bottom: 130px; left: 0; right: 0;
      text-align: center;
      font-size: 220px;
      font-weight: 900;
      letter-spacing: -14px;
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 1px rgba(245,196,0,0.06);
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }

    .home-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.4s ease;
      /* Subtle drop shadow so logo reads over any bg */
      filter: drop-shadow(0 0 32px rgba(245,196,0,0.15));
    }

    .home-logo img {
      height: 58px;
      width: auto;
      display: block;
    }

    .home-divider {
      width: 52px;
      height: 3px;
      background: linear-gradient(90deg, rgba(245,196,0,0.3) 0%, var(--accent) 40%, rgba(245,196,0,0.3) 100%);
      margin: 28px auto 30px;
      border-radius: 999px;
      transition: opacity 0.4s ease;
    }

    .home-tagline {
      font-size: 21px;
      font-weight: 400;
      color: rgba(240,237,232,0.48);
      line-height: 1.5;
      text-align: center;
      max-width: 320px;
      transition: opacity 0.4s ease;
      letter-spacing: 0.1px;
    }

    /* Dimmed class applied during attract mode */
    #home.attract-dim .home-logo,
    #home.attract-dim .home-divider,
    #home.attract-dim .home-tagline {
      opacity: 0.25;
    }

    /* CTA section anchored to bottom */
    .home-cta {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .home-cta-btn {
      width: 100%;
      height: 92px;
      /* Gold gradient — slightly warm, not flat */
      background: linear-gradient(135deg, #F5C400 0%, #FFDB00 45%, #E8A800 100%);
      color: #06050A;
      font-size: 27px;
      font-weight: 900;
      letter-spacing: 3.5px;
      border: none;
      border-radius: 0;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      /* Subtle text shadow for depth */
      text-shadow: 0 1px 0 rgba(255,255,255,0.2);
      box-shadow: 0 -20px 60px rgba(245,196,0,0.12);
      transition: filter 0.15s ease;
    }

    /* Light sweep animation */
    .home-cta-btn::after {
      content: '';
      position: absolute;
      top: 0; left: -80%;
      width: 50%; height: 100%;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(255,255,255,0.22) 50%,
        transparent 100%);
      animation: btnShine 3.2s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes btnShine {
      0%       { left: -80%; }
      40%, 100% { left: 140%; }
    }

    .home-cta-btn:active {
      filter: brightness(0.9);
    }

    .home-hint {
      font-size: 13px;
      color: rgba(240,237,232,0.28);
      margin-top: 16px;
      margin-bottom: 30px;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Animated bounce on the hint arrow */
    .home-hint-arrow {
      display: inline-block;
      animation: hintBounce 1.8s ease-in-out infinite;
    }

    @keyframes hintBounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-5px); }
    }

    /* ─────────────────────────────────────────────────
       ATTRACT MODE OVERLAY
       ───────────────────────────────────────────────── */
    #attract {
      position: absolute;
      inset: 0;
      z-index: 25;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    #attract.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* Fullscreen photo layer */
    .attract-photo-a,
    .attract-photo-b {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 1.2s ease;
    }

    .attract-photo-a { opacity: 1; z-index: 0; }
    .attract-photo-b { opacity: 0; z-index: 1; }

    /* Overlay over attract photos — vignette + gold pulse border */
    .attract-vignette {
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        radial-gradient(ellipse 80% 55% at 50% 50%, transparent 20%, rgba(6,5,10,0.6) 100%),
        linear-gradient(to bottom, rgba(6,5,10,0.55) 0%, rgba(6,5,10,0.15) 40%, rgba(6,5,10,0.15) 60%, rgba(6,5,10,0.7) 100%);
      animation: attractVignettePulse 3s ease-in-out infinite;
    }

    @keyframes attractVignettePulse {
      0%, 100% { box-shadow: inset 0 0 120px rgba(245,196,0,0.0); }
      50%       { box-shadow: inset 0 0 120px rgba(245,196,0,0.22); }
    }

    /* Center content */
    .attract-center {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    .attract-cta {
      font-size: 38px;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text);
      text-align: center;
      line-height: 1.1;
      animation: attractPulse 2s ease-in-out infinite;
      text-shadow: 0 2px 32px rgba(0,0,0,0.8);
    }

    @keyframes attractPulse {
      0%, 100% { opacity: 0.85; transform: scale(1); }
      50%       { opacity: 1;    transform: scale(1.025); }
    }

    /* Cascading chevrons */
    .attract-chevrons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      margin-top: 28px;
    }

    .attract-chevron {
      width: 40px;
      height: 24px;
      display: block;
      opacity: 0;
      animation: chevronCascade 1.8s ease-in-out infinite;
    }

    .attract-chevron:nth-child(1) { animation-delay: 0s; }
    .attract-chevron:nth-child(2) { animation-delay: 0.25s; }
    .attract-chevron:nth-child(3) { animation-delay: 0.5s; }

    @keyframes chevronCascade {
      0%        { opacity: 0;   transform: translateY(-8px); }
      30%, 60%  { opacity: 0.7; transform: translateY(0); }
      100%      { opacity: 0;   transform: translateY(8px); }
    }

    /* ─────────────────────────────────────────────────
       FEED — slide container
       ───────────────────────────────────────────────── */
    #feed {
      position: absolute;
      inset: 0;
      z-index: 10;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease 0.2s;
    }

    #feed.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #slides-container {
      position: absolute;
      inset: 0;
    }

    /* ─────────────────────────────────────────────────
       INDIVIDUAL SLIDE
       ───────────────────────────────────────────────── */
    .slide {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #0a0a0a;
      will-change: transform;
    }

    /* Photo layer */
    .slide-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform-origin: center center;
    }

    .slide.active .slide-img {
      animation: kenburns 9s ease-in-out forwards;
    }

    @keyframes kenburns {
      from { transform: scale(1.0); }
      to   { transform: scale(1.07); }
    }

    /* Gradient overlay — warm gold tint at base lifts brand */
    .slide-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(6,4,0,0.94)      0%,
        rgba(20,12,0,0.60)   28%,
        rgba(7,7,7,0.12)     60%,
        rgba(7,7,7,0.28)    100%
      );
      pointer-events: none;
    }

    /* ─────────────────────────────────────────────────
       PLACEHOLDER — base + 4 visual themes
       ───────────────────────────────────────────────── */
    .slide-placeholder {
      position: absolute; inset: 0;
      display: none;
      align-items: center; justify-content: center;
      /* default = vt-dark */
      background:
        radial-gradient(ellipse 80% 60% at 70% 30%, rgba(245,196,0,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 20% 80%, rgba(180,100,0,0.05) 0%, transparent 55%),
        linear-gradient(160deg, #131008 0%, #080604 55%, #060508 100%);
    }
    .slide-placeholder.shown { display: flex; }

    .slide-placeholder-mark {
      width: 160px; height: 160px;
      object-fit: contain;
      opacity: 0.12;
      pointer-events: none;
    }

    /* ── VT-GOLD: bright yellow, dark text ── */
    .slide.vt-gold .slide-placeholder {
      background: linear-gradient(145deg, #FFD700 0%, #F5C400 40%, #E8A000 80%, #C87800 100%);
    }
    .slide.vt-gold .slide-placeholder-mark { opacity: 0.18; filter: brightness(0); }
    .slide.vt-gold .slide-overlay {
      background: linear-gradient(to top,
        rgba(80,44,0,0.88) 0%, rgba(100,55,0,0.42) 32%,
        rgba(200,140,0,0.06) 62%, rgba(60,35,0,0.18) 100%);
    }
    .slide.vt-gold .slide-client { color: #06050A; }
    .slide.vt-gold .slide-city   { color: rgba(6,5,10,0.62); }
    .slide.vt-gold .slide-desc   { color: rgba(6,5,10,0.58); }
    .slide.vt-gold .slide-category {
      background: rgba(6,5,10,0.14); border-color: rgba(6,5,10,0.22); color: #06050A;
    }
    .slide.vt-gold .slide-stat-chip {
      border-color: rgba(6,5,10,0.18); background: rgba(6,5,10,0.07); color: rgba(6,5,10,0.62);
    }
    .slide.vt-gold .slide-counter        { color: rgba(6,5,10,0.4); }
    .slide.vt-gold .slide-progress-track { background: rgba(6,5,10,0.1); }
    .slide.vt-gold .slide-progress-fill  { background: #06050A; }
    .slide.vt-gold .slide-dot            { background: rgba(6,5,10,0.2); }
    .slide.vt-gold .slide-dot.active     { background: #06050A; }

    /* ── VT-LIGHT: cream/white, warm ── */
    .slide.vt-light .slide-placeholder {
      background: linear-gradient(145deg, #FAFAF5 0%, #F5F0E8 50%, #EDE8DC 100%);
    }
    .slide.vt-light .slide-placeholder-mark { opacity: 0.1; filter: brightness(0); }
    .slide.vt-light .slide-overlay {
      background: linear-gradient(to top,
        rgba(20,14,4,0.92) 0%, rgba(25,18,6,0.52) 32%,
        rgba(240,237,230,0.05) 60%, rgba(220,215,200,0.18) 100%);
    }

    /* ── VT-AMBER: deep warm dark ── */
    .slide.vt-amber .slide-placeholder {
      background:
        radial-gradient(ellipse 70% 50% at 65% 25%, rgba(245,196,0,0.2) 0%, transparent 55%),
        linear-gradient(145deg, #1F1200 0%, #2A1800 45%, #0F0800 100%);
    }
    .slide.vt-amber .slide-overlay {
      background: linear-gradient(to top,
        rgba(10,5,0,0.94) 0%, rgba(28,15,0,0.56) 35%,
        rgba(20,12,0,0.08) 62%, rgba(10,5,0,0.26) 100%);
    }
    /* vt-dark keeps default overlay (already defined above) */

    /* ─── Top bar ─── */
    .slide-topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 44px 24px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      z-index: 5;
    }

    .slide-logo img {
      height: 24px;
      width: auto;
      display: block;
      opacity: 0.85;
    }

    .slide-counter {
      font-family: 'Courier New', 'Courier', monospace;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 1px;
      color: rgba(240,237,232,0.4);
      line-height: 1;
    }

    /* ─── Right-edge progress bar ─── */
    .slide-progress-track {
      position: absolute;
      top: 80px;
      right: 0;
      width: 3px;
      bottom: 80px;
      background: rgba(240,237,232,0.08);
      z-index: 5;
    }

    .slide-progress-fill {
      position: absolute;
      top: 0; left: 0; right: 0;
      background: var(--accent);
      border-radius: 0 0 2px 2px;
      transition: height 0.4s cubic-bezier(0.16,1,0.3,1);
    }

    /* ─── Photo dots ─── */
    .slide-dots {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      z-index: 5;
    }

    .slide-dot {
      width: 3px;
      border-radius: 2px;
      background: rgba(240,237,232,0.25);
      transition: height 0.3s ease, background 0.3s ease;
    }

    .slide-dot.active {
      height: 16px !important;
      background: var(--accent);
    }

    /* ─── Bottom content ─── */
    .slide-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0 32px 136px;
      z-index: 5;
    }

    .slide-category {
      display: inline-block;
      padding: 6px 14px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-ring);
      border-radius: 20px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 14px;
      opacity: 0;
      transform: translateY(24px);
    }

    .slide-client {
      font-size: clamp(26px, 7.5vw, 38px);
      font-weight: 700;
      text-transform: uppercase;
      line-height: 1.05;
      letter-spacing: 0.5px;
      color: var(--text);
      margin-bottom: 12px;
      opacity: 0;
      transform: translateY(24px);
      word-break: break-word;
    }

    .slide-city {
      font-size: 19px;
      font-weight: 500;
      color: var(--white-55);
      margin-bottom: 10px;
      opacity: 0;
      transform: translateY(24px);
    }

    /* NEW: description line */
    .slide-desc {
      font-size: 19px;
      font-weight: 400;
      color: rgba(240, 237, 232, 0.55);
      line-height: 1.4;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      opacity: 0;
      transform: translateY(24px);
    }

    /* NEW: stats chips row */
    .slide-stats {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 8px;
      opacity: 0;
      transform: translateY(24px);
    }

    .slide-stat-chip {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.3px;
      color: rgba(240, 237, 232, 0.70);
      padding: 6px 12px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      border-radius: 20px;
      line-height: 1;
      white-space: nowrap;
    }

    /* Text reveal animation classes */
    .reveal-in {
      animation: revealText 420ms ease-out forwards;
    }

    @keyframes revealText {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ─────────────────────────────────────────────────
       CONTACT FAB WRAPPER (for arc ring)
       ───────────────────────────────────────────────── */
    #fab-wrap {
      position: absolute;
      right: 32px;
      bottom: 32px;
      z-index: 30;
      display: none;
      width: 76px;
      height: 76px;
    }

    #fab-wrap.visible {
      display: block;
    }

    /* Arc ring SVG sits just outside the FAB */
    .fab-ring {
      position: absolute;
      inset: -7px;
      width: 90px;
      height: 90px;
      pointer-events: none;
      transform: rotate(-90deg);
    }

    #fab {
      position: absolute;
      inset: 0;
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      animation: fabPulse 2.5s ease-in-out infinite;
    }

    @keyframes fabPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(245,196,0,0.6); }
      50%       { box-shadow: 0 0 0 16px rgba(245,196,0,0); }
    }

    #fab svg {
      width: 26px;
      height: 26px;
      display: block;
    }

    .fab-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--ground);
      line-height: 1;
    }

    /* ─────────────────────────────────────────────────
       CONTACT OVERLAY
       ───────────────────────────────────────────────── */
    #contact-overlay {
      position: absolute;
      inset: 0;
      z-index: 40;
      background:
        radial-gradient(ellipse 100% 50% at 80% 10%, rgba(245,196,0,0.07) 0%, transparent 55%),
        radial-gradient(ellipse 70% 40% at 10% 90%, rgba(245,196,0,0.04) 0%, transparent 55%),
        rgba(6,5,10,0.96);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 48px 40px;
      transform: translateY(100%);
      transition: transform 500ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    #contact-overlay.open {

    .contact-logo {

    .contact-logo img {
      height: 44px;

      font-size: 14px;

      cursor: pointer;
      transition: border-color 0.15s;

    .contact-back:active {
      border-color: rgba(240,237,232,0.5);
    }

    /* ─────────────────────────────────────────────────
       REDUCED MOTION
       ───────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .slide.active .slide-img { animation: none; }
      @keyframes revealText { to { opacity: 1; transform: none; } }
      @keyframes fabPulse { 0%, 100% { box-shadow: none; } }
      @keyframes attractPulse { 0%, 100% { opacity: 1; transform: none; } }
      @keyframes chevronCascade { 0%, 100% { opacity: 0.5; transform: none; } }
    }
  </style>
</head>
<body>

<div id="stage">

  <!-- ═══════════════════════════════════════════
       HOME SCREEN
  ════════════════════════════════════════════ -->
  <div id="home">

    <!-- Atmospheric depth layers -->
    <div class="h-orb-a"    aria-hidden="true"></div>
    <div class="h-orb-b"    aria-hidden="true"></div>
    <div class="h-ring-1"   aria-hidden="true"></div>
    <div class="h-ring-2"   aria-hidden="true"></div>
    <div class="h-ring-3"   aria-hidden="true"></div>
    <div class="h-grain"    aria-hidden="true"></div>
    <div class="h-fade-bottom" aria-hidden="true"></div>

    <div class="home-inner">
      <div class="home-logo">
        <img src="https://raw.githubusercontent.com/verticalpartsIA/vp-design-system/master/public/logo-color.png" alt="VerticalParts">
      </div>
      <div class="home-divider"></div>
      <p class="home-tagline">
        Transporte vertical para os maiores empreendimentos do Brasil.
      </p>
    </div>

    <div class="home-ghost" aria-hidden="true">11</div>

    <div class="home-cta">
      <button class="home-cta-btn" id="home-btn">EXPLORAR OBRAS</button>
      <p class="home-hint">
        <span class="home-hint-arrow">↑</span>
        Arraste para navegar
      </p>
    </div>

  </div>

  <!-- ═══════════════════════════════════════════
       ATTRACT MODE OVERLAY
  ════════════════════════════════════════════ -->
  <div id="attract" aria-hidden="true">
    <!-- Two-layer crossfade images -->
    <img class="attract-photo-a" id="attract-img-a" src="" alt="" />
    <img class="attract-photo-b" id="attract-img-b" src="" alt="" />

    <!-- Vignette -->
    <div class="attract-vignette"></div>

    <!-- Center CTA -->
    <div class="attract-center">
      <div class="attract-cta">TOQUE PARA<br>EXPLORAR</div>
      <div class="attract-chevrons" aria-hidden="true">
        <!-- Each chevron is an inline SVG pointing upward -->
        <svg class="attract-chevron" viewBox="0 0 40 24" fill="none">
          <polyline points="4,20 20,6 36,20" stroke="rgba(245,196,0,0.8)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <svg class="attract-chevron" viewBox="0 0 40 24" fill="none">
          <polyline points="4,20 20,6 36,20" stroke="rgba(245,196,0,0.8)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <svg class="attract-chevron" viewBox="0 0 40 24" fill="none">
          <polyline points="4,20 20,6 36,20" stroke="rgba(245,196,0,0.8)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       FEED — slides injected here by JS
  ════════════════════════════════════════════ -->
  <div id="feed">
    <div id="slides-container"></div>
  </div>

  <!-- ═══════════════════════════════════════════
       CONTACT FAB (with arc ring wrapper)
  ════════════════════════════════════════════ -->
  <div id="fab-wrap">
    <!-- Arc progress ring -->
    <svg class="fab-ring" viewBox="0 0 90 90" aria-hidden="true">
      <!-- Track circle -->
      <circle cx="45" cy="45" r="40" fill="none"
        stroke="rgba(255,255,255,0.15)" stroke-width="2.5"/>
      <!-- Fill circle — animated by JS via stroke-dashoffset -->
      <circle id="ring-fill" cx="45" cy="45" r="40" fill="none"
        stroke="#F5C400" stroke-width="2.5"
        stroke-dasharray="251.3" stroke-dashoffset="251.3"
        stroke-linecap="round"
        style="opacity:0.85"/>
    </svg>
    <button id="fab" aria-label="Abrir contato">
      <svg viewBox="0 0 24 24" fill="none" stroke="#070707" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="4" width="20" height="16" rx="1" />
        <polyline points="2,4 12,13 22,4" />
      </svg>
      <span class="fab-label">Contato</span>
    </button>
  </div>

  <!-- ═══════════════════════════════════════════
       CONTACT OVERLAY
  ════════════════════════════════════════════ -->
  <div id="contact-overlay" role="dialog" aria-label="Contato VerticalParts" aria-hidden="true">
    <!-- Decorative rings (same language as home) -->
    <div style="position:absolute;width:400px;height:400px;border-radius:50%;top:-130px;right:-130px;border:1px solid rgba(245,196,0,0.1);pointer-events:none" aria-hidden="true"></div>
    <div style="position:absolute;width:240px;height:240px;border-radius:50%;top:-30px;right:-40px;border:1px solid rgba(245,196,0,0.13);pointer-events:none" aria-hidden="true"></div>
    <div class="contact-logo"><img src="https://raw.githubusercontent.com/verticalpartsIA/vp-design-system/master/public/logo-color.png" alt="VerticalParts"></div>
    <div class="contact-tagline">Soluções em transporte vertical</div>
    <div class="contact-divider"></div>
    <div class="contact-qr" aria-label="QR Code">
      <span class="contact-qr-label">QR CODE</span>
    </div>
    <div class="contact-url">verticalparts.com.br</div>
    <button class="contact-back" id="contact-back-btn">← VOLTAR</button>
  </div>

</div><!-- /#stage -->

<script>
  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     CONSTANTS & TIMINGS
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  const IDLE_MS            = 180_000;  // 3 min → return to home from feed
  const ATTRACT_MS         = 20_000;   // 20s idle on home → attract mode
  const ATTRACT_PHOTO_MS   = 4_000;    // 4s per photo in attract mode
  const AUTO_ADV_MS        = 6_000;    // 6s no-touch → auto-advance
  const AUTO_ADV_RESUME_MS = 8_000;    // 8s after touch → resume auto-advance
  const SNAP_THRESH        = 0.18;     // 18% stage height
  const SPRING             = 'cubic-bezier(0.16, 1, 0.3, 1)';
  const SPRING_DUR         = '480ms';
  const RUBBER_FACTOR      = 0.15;
  /* Circumference of the arc ring: 2π × 40 ≈ 251.3 */
  const RING_CIRC          = 251.3;

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     STATE
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  let slides       = [];
  let SLIDES_SRCS  = [];  // flat list of all image srcs for attract cycling
  let currentIndex = 0;
  let slideEls     = [];

  let touchStartY  = 0;
  let touchCurY    = 0;
  let isDragging   = false;
  let isAnimating  = false;

  // Timers
  let idleTimer         = null;
  let attractTimer      = null;
  let attractPhotoTimer = null;
  let autoAdvTimer      = null;
  let autoAdvRAF        = null;
  let autoAdvStart      = null;
  let autoAdvDuration   = AUTO_ADV_MS;

  // Attract state
  let isAttractMode   = false;
  let attractIndex    = 0;
  let attractLayerA   = true; // which img layer is "on top"

  // Whether user has manually interacted in feed (affects resume delay)
  let feedHadTouch = false;

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     DOM REFS
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  const $stage      = document.getElementById('stage');
  const $home       = document.getElementById('home');
  const $homeBtn    = document.getElementById('home-btn');
  const $feed       = document.getElementById('feed');
  const $container  = document.getElementById('slides-container');
  const $fabWrap    = document.getElementById('fab-wrap');
  const $fab        = document.getElementById('fab');
  const $ringFill   = document.getElementById('ring-fill');
  const $overlay    = document.getElementById('contact-overlay');
  const $backBtn    = document.getElementById('contact-back-btn');
  const $attract    = document.getElementById('attract');
  const $attractA   = document.getElementById('attract-img-a');
  const $attractB   = document.getElementById('attract-img-b');

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     IDLE TIMER (feed → home)
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function resetIdle() {
    clearTimeout(idleTimer);
    idleTimer = setTimeout(returnHome, IDLE_MS);
  }

  function returnHome() {
    closeContact();
    stopAutoAdvance();
    if (currentIndex !== 0) {
      currentIndex = 0;
      positionSlides(false);
    }
    showHome();
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     ATTRACT MODE TIMER (home idle → attract)
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function resetAttractTimer() {
    clearTimeout(attractTimer);
    attractTimer = setTimeout(enterAttractMode, ATTRACT_MS);
  }

  function enterAttractMode() {
    if (isAttractMode) return;
    if ($feed.classList.contains('visible')) return; // only on home
    isAttractMode = true;

    // Pick attract photos: every 5th slide src for variety
    const photos = SLIDES_SRCS.filter((_, i) => i % 5 === 0);
    if (photos.length === 0) return;

    // Dim the home content behind
    $home.classList.add('attract-dim');

    // Seed first photo on layer A
    attractIndex = 0;
    $attractA.src = photos[attractIndex % photos.length];
    $attractA.style.opacity = '1';
    $attractB.style.opacity = '0';
    attractLayerA = true;

    $attract.classList.add('visible');
    $attract.setAttribute('aria-hidden', 'false');

    // Cycle photos every ATTRACT_PHOTO_MS
    attractPhotoTimer = setInterval(() => {
      attractIndex++;
      const nextSrc = photos[attractIndex % photos.length];
      if (attractLayerA) {
        // Load next into B, fade B in (B is on top — z-index 1)
        $attractB.src = nextSrc;
        $attractB.style.opacity = '1';
        $attractA.style.opacity = '0';
        attractLayerA = false;
      } else {
        $attractA.src = nextSrc;
        $attractA.style.opacity = '1';
        $attractB.style.opacity = '0';
        attractLayerA = true;
      }
    }, ATTRACT_PHOTO_MS);
  }

  function exitAttractMode() {
    if (!isAttractMode) return;
    isAttractMode = false;
    clearInterval(attractPhotoTimer);
    $attract.classList.remove('visible');
    $attract.setAttribute('aria-hidden', 'true');
    $home.classList.remove('attract-dim');
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     HOME ↔ FEED TRANSITIONS
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function enterFeed() {
    exitAttractMode();
    clearTimeout(attractTimer);
    resetIdle();
    feedHadTouch = false;

    $home.classList.add('exiting');
    $feed.classList.add('visible');
    $fabWrap.classList.add('visible');

    setTimeout(() => {
      $home.classList.add('hidden');
      $home.classList.remove('exiting');
    }, 520);

    // Start auto-advance after initial delay
    scheduleAutoAdvance(AUTO_ADV_MS);
  }

  function showHome() {
    $home.classList.remove('hidden', 'exiting');
    $feed.classList.remove('visible');
    $fabWrap.classList.remove('visible');
    clearTimeout(idleTimer);
    stopAutoAdvance();
    feedHadTouch = false;
    // Reset ring
    setRingProgress(0);
    // Start attract timer
    resetAttractTimer();
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     AUTO-ADVANCE (feed)
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function scheduleAutoAdvance(delay) {
    stopAutoAdvance();
    autoAdvDuration = delay;
    autoAdvTimer = setTimeout(() => {
      startAutoAdvanceAnim();
    }, 0); // kick off immediately — animation itself takes `delay` ms

    // Actually we drive via rAF from start:
    stopAutoAdvance();
    autoAdvStart = performance.now();
    autoAdvDuration = delay;
    setRingProgress(0);
    animateRing();
  }

  function animateRing() {
    autoAdvRAF = requestAnimationFrame((now) => {
      const elapsed = now - autoAdvStart;
      const progress = Math.min(elapsed / autoAdvDuration, 1);
      setRingProgress(progress);

      if (progress < 1) {
        animateRing();
      } else {
        // Time's up — advance to next slide (loop at end)
        const nextIdx = (currentIndex + 1) % slides.length;
        setSlide(nextIdx, true);
        // After spring, reset and restart
        setTimeout(() => {
          setRingProgress(0);
          scheduleAutoAdvance(AUTO_ADV_MS);
        }, 520);
      }
    });
  }

  function stopAutoAdvance() {
    if (autoAdvRAF) {
      cancelAnimationFrame(autoAdvRAF);
      autoAdvRAF = null;
    }
    clearTimeout(autoAdvTimer);
    autoAdvTimer = null;
    setRingProgress(0);
  }

  function setRingProgress(progress) {
    // progress 0 → ring empty (offset = RING_CIRC)
    // progress 1 → ring full (offset = 0)
    const offset = RING_CIRC * (1 - progress);
    $ringFill.style.strokeDashoffset = offset.toFixed(2);
  }

  function onFeedTouch() {
    // Called on any touch in the feed — cancels and reschedules auto-advance
    stopAutoAdvance();
    feedHadTouch = true;
    const resumeDelay = AUTO_ADV_RESUME_MS;
    // Schedule restart after 8s
    autoAdvTimer = setTimeout(() => {
      autoAdvStart = performance.now();
      autoAdvDuration = AUTO_ADV_MS;
      animateRing();
    }, resumeDelay);
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     BUILD SLIDES FROM DATA
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function buildSlidesFromClientes(clientes) {
    slides = [];
    SLIDES_SRCS = [];

    clientes.forEach(c => {
      c.imagens.forEach((src, photoIdx) => {
        slides.push({
          src,
          cliente:     c.cliente,
          cidade:      c.cidade,
          categoria:   c.categoria,
          descricao:   c.descricao  || '',
          stats:       c.stats      || [],
          photoIndex:  photoIdx,
          totalPhotos: c.imagens.length,
        });
        SLIDES_SRCS.push(src);
      });
    });

    $container.innerHTML = '';
    slideEls = [];

    slides.forEach((data, idx) => {
      const el = createSlideEl(data, idx);
      $container.appendChild(el);
      slideEls.push(el);
    });

    positionSlides(false);
    updateUI(0, false);
  }

  const THEMES       = ['vt-dark', 'vt-gold', 'vt-light', 'vt-amber'];
  const LOGO_COLOR   = 'https://raw.githubusercontent.com/verticalpartsIA/vp-design-system/master/public/logo-color.png';
  const LOGO_MARK    = 'https://raw.githubusercontent.com/verticalpartsIA/vp-design-system/master/public/logo-mark.png';

  function createSlideEl(data, idx) {
    const el = document.createElement('div');
    // Assign theme based on which client group this slide belongs to
    const clientIdx = Math.floor(idx / (data.totalPhotos || 5));
    const theme = THEMES[clientIdx % THEMES.length];
    el.className = `slide ${theme}`;
    el.dataset.index = idx;

    /* Photo */
    const img = document.createElement('img');
    img.className = 'slide-img';
    img.alt = `${data.cliente} — foto ${data.photoIndex + 1}`;
    img.src = data.src;

    const placeholder = document.createElement('div');
    placeholder.className = 'slide-placeholder';
    placeholder.innerHTML = `<img class="slide-placeholder-mark" src="${LOGO_MARK}" alt="">`;
    img.addEventListener('error', () => {
      img.style.display = 'none';
      placeholder.classList.add('shown');
    });

    /* Gradient overlay */
    const overlay = document.createElement('div');
    overlay.className = 'slide-overlay';

    /* Top bar */
    const topbar = document.createElement('div');
    topbar.className = 'slide-topbar';
    const counterStr = `${String(idx + 1).padStart(2,'0')} / ${String(slides.length).padStart(2,'0')}`;
    // On gold/light themes the topbar background is bright — use dark logo-mark
    const topLogoSrc = (theme === 'vt-gold' || theme === 'vt-light') ? LOGO_MARK : LOGO_COLOR;
    const topLogoStyle = (theme === 'vt-gold' || theme === 'vt-light')
      ? 'height:28px;width:auto;filter:brightness(0);opacity:0.5'
      : 'height:24px;width:auto;opacity:0.85';
    topbar.innerHTML = `
      <div class="slide-logo"><img src="${topLogoSrc}" alt="VerticalParts" style="${topLogoStyle}"></div>
      <div class="slide-counter">${counterStr}</div>
    `;

    /* Right progress track */
    const progressTrack = document.createElement('div');
    progressTrack.className = 'slide-progress-track';
    const progressFill = document.createElement('div');
    progressFill.className = 'slide-progress-fill';
    progressTrack.appendChild(progressFill);

    /* Photo dots */
    const dotsEl = document.createElement('div');
    dotsEl.className = 'slide-dots';
    for (let d = 0; d < data.totalPhotos; d++) {
      const dot = document.createElement('div');
      dot.className = 'slide-dot';
      dot.style.height = '6px';
      if (d === data.photoIndex) dot.classList.add('active');
      dotsEl.appendChild(dot);
    }

    /* Bottom content */
    const bottom = document.createElement('div');
    bottom.className = 'slide-bottom';

    const categoryEl = document.createElement('div');
    categoryEl.className = 'slide-category';
    categoryEl.textContent = data.categoria;

    const clientEl = document.createElement('div');
    clientEl.className = 'slide-client';
    clientEl.textContent = data.cliente;

    const cityEl = document.createElement('div');
    cityEl.className = 'slide-city';
    cityEl.textContent = data.cidade;

    const descEl = document.createElement('div');
    descEl.className = 'slide-desc';
    descEl.textContent = data.descricao;

    const statsEl = document.createElement('div');
    statsEl.className = 'slide-stats';
    data.stats.forEach(stat => {
      const chip = document.createElement('span');
      chip.className = 'slide-stat-chip';
      chip.textContent = stat;
      statsEl.appendChild(chip);
    });

    bottom.appendChild(categoryEl);
    bottom.appendChild(clientEl);
    bottom.appendChild(cityEl);
    bottom.appendChild(descEl);
    bottom.appendChild(statsEl);

    /* Assemble */
    el.appendChild(img);
    el.appendChild(placeholder);
    el.appendChild(overlay);
    el.appendChild(topbar);
    el.appendChild(progressTrack);
    el.appendChild(dotsEl);
    el.appendChild(bottom);

    return el;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     POSITION ALL SLIDES
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function positionSlides(animate, dragOffset = 0) {
    const stageH = $stage.offsetHeight;

    slideEls.forEach((el, i) => {
      const baseY = (i - currentIndex) * stageH + dragOffset;

      if (animate) {
        el.style.transition = `transform ${SPRING_DUR} ${SPRING}`;
      } else {
        el.style.transition = 'none';
      }

      el.style.transform = `translateY(${baseY}px)`;
    });
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     SET SLIDE
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function setSlide(idx, animate) {
    if (idx < 0 || idx >= slides.length) return;

    const prev = currentIndex;
    currentIndex = idx;

    if (slideEls[prev]) {
      slideEls[prev].classList.remove('active');
      const prevImg = slideEls[prev].querySelector('.slide-img');
      if (prevImg) prevImg.style.animation = 'none';
    }

    slideEls[idx].classList.add('active');

    const activeImg = slideEls[idx].querySelector('.slide-img');
    if (activeImg) {
      void activeImg.offsetWidth;
      activeImg.style.animation = '';
    }

    positionSlides(animate);
    updateUI(idx, animate);
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     UPDATE UI
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function updateUI(idx, animate) {
    const total = slides.length;
    const pct   = total > 1 ? (idx / (total - 1)) * 100 : 0;

    const activeEl = slideEls[idx];
    if (!activeEl) return;

    const fill = activeEl.querySelector('.slide-progress-fill');
    if (fill) fill.style.height = `${pct}%`;

    if (animate) {
      triggerTextReveal(activeEl);
    } else {
      const els = activeEl.querySelectorAll(
        '.slide-category, .slide-client, .slide-city, .slide-desc, .slide-stats'
      );
      els.forEach(e => {
        e.style.opacity = '1';
        e.style.transform = 'none';
      });
    }
  }

  function triggerTextReveal(slideEl) {
    const items = [
      slideEl.querySelector('.slide-category'),
      slideEl.querySelector('.slide-client'),
      slideEl.querySelector('.slide-city'),
      slideEl.querySelector('.slide-desc'),
      slideEl.querySelector('.slide-stats'),
    ];

    items.forEach((el, i) => {
      if (!el) return;
      el.style.opacity = '0';
      el.style.transform = 'translateY(24px)';
      el.style.animation = 'none';
      el.classList.remove('reveal-in');

      // Stagger: 60ms base, desc/stats have an extra gap after city
      const delay = i <= 2 ? i * 60 : 180 + (i - 3) * 70;
      setTimeout(() => {
        el.style.animation = '';
        el.classList.add('reveal-in');
        setTimeout(() => {
          el.style.opacity  = '1';
          el.style.transform = 'none';
        }, 440);
      }, delay);
    });
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     TOUCH HANDLERS — TikTok-style drag
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function onTouchStart(e) {
    if (isAnimating) return;

    const inFeed = $feed.classList.contains('visible');
    const inHome = !inFeed && !$home.classList.contains('hidden');

    if (inHome) {
      // Any touch on home: exit attract mode and reset attract timer
      if (isAttractMode) {
        exitAttractMode();
        resetAttractTimer();
        return; // eat this touch — don't enter feed immediately
      }
      resetAttractTimer();
      return;
    }

    if (!inFeed) return;
    if ($overlay.classList.contains('open')) return;
    if (e.target.closest('#fab-wrap') || e.target.closest('#contact-overlay')) return;

    resetIdle();
    onFeedTouch(); // cancel/reset auto-advance

    isDragging  = true;
    touchStartY = e.touches[0].clientY;
    touchCurY   = touchStartY;

    slideEls.forEach(el => { el.style.transition = 'none'; });
  }

  function onTouchMove(e) {
    if (!isDragging) return;
    e.preventDefault();
    resetIdle();

    touchCurY = e.touches[0].clientY;
    let delta = touchCurY - touchStartY;

    const atFirst = currentIndex === 0;
    const atLast  = currentIndex === slides.length - 1;

    if ((delta > 0 && atFirst) || (delta < 0 && atLast)) {
      delta *= RUBBER_FACTOR;
    }

    positionSlides(false, delta);
  }

  function onTouchEnd(e) {
    if (!isDragging) return;
    isDragging = false;
    resetIdle();

    const stageH    = $stage.offsetHeight;
    const delta     = touchCurY - touchStartY;
    const absDelta  = Math.abs(delta);
    const atFirst   = currentIndex === 0;
    const atLast    = currentIndex === slides.length - 1;
    const threshold = stageH * SNAP_THRESH;

    isAnimating = true;

    if (absDelta > threshold) {
      if (delta < 0 && !atLast) {
        setSlide(currentIndex + 1, true);
      } else if (delta > 0 && !atFirst) {
        setSlide(currentIndex - 1, true);
      } else {
        positionSlides(true, 0);
      }
    } else {
      positionSlides(true, 0);
    }

    setTimeout(() => { isAnimating = false; }, 520);
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     CONTACT OVERLAY
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function openContact() {
    $overlay.classList.add('open');
    $overlay.setAttribute('aria-hidden', 'false');
    stopAutoAdvance();
    resetIdle();
  }

  function closeContact() {
    $overlay.classList.remove('open');
    $overlay.setAttribute('aria-hidden', 'true');
    // Resume auto-advance if feed is visible
    if ($feed.classList.contains('visible')) {
      scheduleAutoAdvance(AUTO_ADV_RESUME_MS);
    }
    resetIdle();
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     EVENT WIRING
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  $homeBtn.addEventListener('click', enterFeed);

  $fab.addEventListener('click', (e) => {
    e.stopPropagation();
    openContact();
  });
  $backBtn.addEventListener('click', closeContact);

  $stage.addEventListener('touchstart', onTouchStart, { passive: true });
  $stage.addEventListener('touchmove',  onTouchMove,  { passive: false });
  $stage.addEventListener('touchend',   onTouchEnd,   { passive: true });

  // Also handle clicks on home button for desktop/testing
  $stage.addEventListener('click', (e) => {
    const inHome = !$feed.classList.contains('visible') && !$home.classList.contains('hidden');
    if (inHome) {
      if (isAttractMode) {
        exitAttractMode();
        resetAttractTimer();
      } else {
        resetAttractTimer();
      }
    }
  });

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     INIT — load clientes.json and boot
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  async function init() {
    let clientes = [];

    try {
      const res = await fetch('config/clientes.json');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      clientes = await res.json();
    } catch (err) {
      console.warn('clientes.json não carregado:', err);
      clientes = Array.from({ length: 11 }, (_, ci) => ({
        id: `cliente_${ci + 1}`,
        cliente: `Cliente ${String(ci + 1).padStart(2,'0')}`,
        cidade: 'São Paulo, SP',
        categoria: 'Escadas Rolantes',
        descricao: 'Serviço de manutenção e instalação de equipamentos.',
        stats: ['5 unidades', 'Alto fluxo'],
        imagens: Array.from({ length: 5 }, () => ''),
      }));
    }

    buildSlidesFromClientes(clientes);

    // Start attract timer — nobody has touched yet
    resetAttractTimer();
  }

  init();
</script>
</body>
</html>
