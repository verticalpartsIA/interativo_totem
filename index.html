<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <title>VerticalParts — Portfólio</title>
  <style>
    /* ─────────────────────────────────────────────────
       DESIGN TOKENS
       Palette: near-black / industrial neutral
       ground:    #070707
       text:      #F0EDE8
       accent:    #F5C400  (VP gold)
       muted:     #C8C4BC
       ───────────────────────────────────────────────── */
    :root {
      --ground:  #070707;
      --text:    #F0EDE8;
      --accent:  #F5C400;
      --muted:   #C8C4BC;

      /* Derived */
      --accent-dim:  rgba(245, 196, 0, 0.12);
      --accent-ring: rgba(245, 196, 0, 0.30);
      --white-55:    rgba(240, 237, 232, 0.55);
      --white-30:    rgba(240, 237, 232, 0.30);
      --white-10:    rgba(240, 237, 232, 0.10);
      --black-90:    rgba(7, 7, 7, 0.90);
      --black-45:    rgba(7, 7, 7, 0.45);
      --black-10:    rgba(7, 7, 7, 0.10);
      --black-30:    rgba(7, 7, 7, 0.30);
    }

    /* ─────────────────────────────────────────────────
       RESET & BASE
       ───────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      margin: 0; padding: 0;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: var(--text);
      touch-action: none;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─────────────────────────────────────────────────
       STAGE — 9:16 totem viewport centered on screen
       ───────────────────────────────────────────────── */
    #stage {
      width:  min(100vw, calc(100vh * 9 / 16));
      height: min(100vh, calc(100vw * 16 / 9));
      aspect-ratio: 9 / 16;
      background: var(--ground);
      position: relative;
      overflow: hidden;
      touch-action: none;
      /* Subtle outer glow so it floats on dark desktops */
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.05),
        0 0 80px rgba(0,0,0,0.8);
    }

    /* ─────────────────────────────────────────────────
       HOME SCREEN
       ───────────────────────────────────────────────── */
    #home {
      position: absolute;
      inset: 0;
      background: var(--ground);
      display: flex;
      flex-direction: column;
      z-index: 20;
      transition: opacity 0.5s ease, transform 0.5s ease;
      will-change: opacity, transform;
    }

    #home.exiting {
      opacity: 0;
      transform: scale(1.04);
      pointer-events: none;
    }

    #home.hidden {
      display: none;
    }

    /* Technical drawing paper grid — subtle, earned by subject matter */
    #home::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,196,0,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,196,0,0.018) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial gold bloom behind logo area */
    #home::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 45%, rgba(245,196,0,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .home-inner {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 48px;
      gap: 0;
    }

    /* Ghost number — largest typographic element, purely atmospheric */
    .home-ghost {
      position: absolute;
      bottom: 108px;
      left: 0; right: 0;
      text-align: center;
      font-size: 148px;
      font-weight: 900;
      letter-spacing: -8px;
      color: var(--text);
      opacity: 0.04;
      pointer-events: none;
      user-select: none;
      line-height: 1;
      z-index: 0;
      /* Condensed feel — squish with transform */
      transform: scaleX(0.82);
    }

    .home-logo {
      font-size: 52px;
      font-weight: 400;
      letter-spacing: -1.5px;
      color: var(--text);
      line-height: 1;
      text-align: center;
    }

    .home-logo strong {
      font-weight: 900;
    }

    .home-divider {
      width: 48px;
      height: 3px;
      background: var(--accent);
      margin: 28px auto 32px;
    }

    .home-tagline {
      font-size: 22px;
      font-weight: 400;
      color: var(--white-55);
      line-height: 1.45;
      text-align: center;
      max-width: 340px;
    }

    /* CTA section anchored to bottom */
    .home-cta {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .home-cta-btn {
      width: 100%;
      height: 88px;
      background: var(--accent);
      color: var(--ground);
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 3px;
      border: none;
      border-radius: 0;
      cursor: pointer;
      /* No transition — hard mechanical press */
      transition: background 0.1s;
    }

    .home-cta-btn:active {
      background: #ddb000;
    }

    .home-hint {
      font-size: 13px;
      color: var(--white-30);
      margin-top: 18px;
      margin-bottom: 32px;
      letter-spacing: 0.5px;
    }

    /* ─────────────────────────────────────────────────
       FEED — slide container
       ───────────────────────────────────────────────── */
    #feed {
      position: absolute;
      inset: 0;
      z-index: 10;
      overflow: hidden;
      /* Starts hidden; revealed when home exits */
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease 0.2s;
    }

    #feed.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* The slides container — fills stage, all slides positioned inside */
    #slides-container {
      position: absolute;
      inset: 0;
      /* No overflow clip here — slides translate outside bounds during drag */
    }

    /* ─────────────────────────────────────────────────
       INDIVIDUAL SLIDE
       ───────────────────────────────────────────────── */
    .slide {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #0a0a0a;
      will-change: transform;
    }

    /* Photo layer */
    .slide-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      /* Ken Burns: only activated on .active slide via .kb class */
      transform-origin: center center;
    }

    .slide.active .slide-img {
      animation: kenburns 9s ease-in-out forwards;
    }

    @keyframes kenburns {
      from { transform: scale(1.0); }
      to   { transform: scale(1.07); }
    }

    /* Gradient overlay — heavier at bottom for text legibility, subtle at top */
    .slide-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(7,7,7,0.90)  0%,
        rgba(7,7,7,0.45) 40%,
        rgba(7,7,7,0.10) 65%,
        rgba(7,7,7,0.30) 100%
      );
      pointer-events: none;
    }

    /* Fallback when image 404s */
    .slide-placeholder {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .slide-placeholder.shown {
      display: flex;
    }

    .slide-placeholder-mark {
      font-size: 96px;
      font-weight: 900;
      letter-spacing: -4px;
      color: var(--accent);
      opacity: 0.15;
      line-height: 1;
    }

    /* ─── Top bar ─── */
    .slide-topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 44px 24px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      z-index: 5;
    }

    .slide-logo {
      font-size: 15px;
      font-weight: 400;
      letter-spacing: -0.3px;
      color: rgba(240,237,232,0.7);
      line-height: 1;
    }

    .slide-logo strong {
      font-weight: 900;
    }

    /* Slide counter — monospaced to feel like an engineering readout */
    .slide-counter {
      font-family: 'Courier New', 'Courier', monospace;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 1px;
      color: rgba(240,237,232,0.4);
      line-height: 1;
    }

    /* ─── Right-edge progress bar ─── */
    .slide-progress-track {
      position: absolute;
      top: 80px;
      right: 0;
      width: 3px;
      bottom: 80px;
      background: rgba(240,237,232,0.08);
      z-index: 5;
    }

    .slide-progress-fill {
      position: absolute;
      top: 0; left: 0; right: 0;
      background: var(--accent);
      border-radius: 0 0 2px 2px;
      transition: height 0.4s cubic-bezier(0.16,1,0.3,1);
    }

    /* ─── Photo dots (which of 5 images within this client) ─── */
    .slide-dots {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      z-index: 5;
    }

    .slide-dot {
      width: 3px;
      border-radius: 2px;
      background: rgba(240,237,232,0.25);
      transition: height 0.3s ease, background 0.3s ease;
    }

    .slide-dot.active {
      height: 16px !important;
      background: var(--accent);
    }

    /* ─── Bottom content ─── */
    .slide-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0 32px 44px;
      z-index: 5;
    }

    .slide-category {
      display: inline-block;
      padding: 6px 14px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-ring);
      border-radius: 20px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 14px;
      /* Text reveal: starts offset, animated to position */
      opacity: 0;
      transform: translateY(24px);
    }

    .slide-client {
      font-size: 56px;
      font-weight: 900;
      text-transform: uppercase;
      line-height: 0.9;
      letter-spacing: -2.5px;
      color: var(--text);
      margin-bottom: 12px;
      opacity: 0;
      transform: translateY(24px);
    }

    .slide-city {
      font-size: 19px;
      font-weight: 500;
      color: var(--white-55);
      opacity: 0;
      transform: translateY(24px);
    }

    /* Text reveal animation classes applied by JS */
    .reveal-in {
      animation: revealText 420ms ease-out forwards;
    }

    @keyframes revealText {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ─────────────────────────────────────────────────
       CONTACT FAB
       ───────────────────────────────────────────────── */
    #fab {
      position: absolute;
      right: 32px;
      bottom: 32px;
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      z-index: 30;
      display: none;  /* shown only during feed */
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      animation: fabPulse 2.5s ease-in-out infinite;
    }

    #fab.visible {
      display: flex;
    }

    @keyframes fabPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(245,196,0,0.6); }
      50%       { box-shadow: 0 0 0 16px rgba(245,196,0,0); }
    }

    #fab svg {
      width: 26px;
      height: 26px;
      display: block;
    }

    .fab-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--ground);
      line-height: 1;
    }

    /* ─────────────────────────────────────────────────
       CONTACT OVERLAY
       ───────────────────────────────────────────────── */
    #contact-overlay {
      position: absolute;
      inset: 0;
      z-index: 40;
      background: rgba(7,7,7,0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 48px 40px;
      /* Slide up from bottom */
      transform: translateY(100%);
      transition: transform 500ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    #contact-overlay.open {
      transform: translateY(0);
    }

    .contact-logo {
      font-size: 36px;
      font-weight: 400;
      letter-spacing: -1px;
      color: var(--text);
      margin-bottom: 10px;
    }

    .contact-logo strong {
      font-weight: 900;
    }

    .contact-tagline {
      font-size: 16px;
      color: var(--muted);
      font-weight: 400;
      margin-bottom: 28px;
    }

    .contact-divider {
      width: 48px;
      height: 3px;
      background: var(--accent);
      margin-bottom: 40px;
    }

    .contact-qr {
      width: 220px;
      height: 220px;
      background: #fff;
      border: 3px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
    }

    .contact-qr-label {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      color: #888;
      text-transform: uppercase;
    }

    .contact-url {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.3px;
      margin-bottom: 40px;
    }

    .contact-back {
      background: transparent;
      border: 1px solid rgba(240,237,232,0.20);
      padding: 16px 48px;
      color: var(--text);
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 2px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .contact-back:active {
      border-color: rgba(240,237,232,0.5);
    }

    /* ─────────────────────────────────────────────────
       REDUCED MOTION
       ───────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .slide.active .slide-img { animation: none; }
      @keyframes revealText { to { opacity: 1; transform: none; } }
      @keyframes fabPulse { 0%, 100% { box-shadow: none; } }
    }
  </style>
</head>
<body>

<div id="stage">

  <!-- ═══════════════════════════════════════════
       HOME SCREEN
  ════════════════════════════════════════════ -->
  <div id="home">

    <div class="home-inner">
      <!-- Logo -->
      <div class="home-logo">Vertical<strong>Parts</strong></div>

      <!-- Gold rule — weight, not decoration -->
      <div class="home-divider"></div>

      <!-- Tagline: plain, specific, from the subject -->
      <p class="home-tagline">
        Transporte vertical para os maiores empreendimentos do Brasil.
      </p>
    </div>

    <!-- Ghost "55" — the portfolio count as ambient typography -->
    <div class="home-ghost" aria-hidden="true">55</div>

    <!-- CTA anchored to floor -->
    <div class="home-cta">
      <button class="home-cta-btn" id="home-btn">EXPLORAR OBRAS</button>
      <p class="home-hint">↑ Arraste para navegar</p>
    </div>

  </div>

  <!-- ═══════════════════════════════════════════
       FEED — slides injected here by JS
  ════════════════════════════════════════════ -->
  <div id="feed">
    <div id="slides-container"></div>
  </div>

  <!-- ═══════════════════════════════════════════
       CONTACT FAB
  ════════════════════════════════════════════ -->
  <button id="fab" aria-label="Abrir contato">
    <!-- Envelope SVG -->
    <svg viewBox="0 0 24 24" fill="none" stroke="#070707" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="2" y="4" width="20" height="16" rx="1" />
      <polyline points="2,4 12,13 22,4" />
    </svg>
    <span class="fab-label">Contato</span>
  </button>

  <!-- ═══════════════════════════════════════════
       CONTACT OVERLAY
  ════════════════════════════════════════════ -->
  <div id="contact-overlay" role="dialog" aria-label="Contato VerticalParts" aria-hidden="true">
    <div class="contact-logo">Vertical<strong>Parts</strong></div>
    <div class="contact-tagline">Soluções em transporte vertical</div>
    <div class="contact-divider"></div>
    <div class="contact-qr" aria-label="QR Code">
      <span class="contact-qr-label">QR CODE</span>
    </div>
    <div class="contact-url">verticalparts.com.br</div>
    <button class="contact-back" id="contact-back-btn">← VOLTAR</button>
  </div>

</div><!-- /#stage -->

<script>
  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     CONSTANTS & STATE
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  const IDLE_MS       = 180_000;  // 3 minutes
  const SNAP_THRESH   = 0.18;     // 18% of stage height triggers slide change
  const SPRING        = 'cubic-bezier(0.16, 1, 0.3, 1)';
  const SPRING_DUR    = '480ms';
  const RUBBER_FACTOR = 0.15;     // resistance at first/last slide

  let slides       = [];          // flat array of {src, cliente, cidade, categoria, photoIndex, slideIndex}
  let currentIndex = 0;
  let slideEls     = [];          // DOM elements, one per slide

  let touchStartY  = 0;
  let touchCurY    = 0;
  let isDragging   = false;
  let isAnimating  = false;

  let idleTimer    = null;

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     DOM REFS
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  const $stage      = document.getElementById('stage');
  const $home       = document.getElementById('home');
  const $homeBtn    = document.getElementById('home-btn');
  const $feed       = document.getElementById('feed');
  const $container  = document.getElementById('slides-container');
  const $fab        = document.getElementById('fab');
  const $overlay    = document.getElementById('contact-overlay');
  const $backBtn    = document.getElementById('contact-back-btn');

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     IDLE TIMER
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function resetIdle() {
    clearTimeout(idleTimer);
    idleTimer = setTimeout(returnHome, IDLE_MS);
  }

  function returnHome() {
    // Close overlay, reset to first slide, show home
    closeContact();
    if (currentIndex !== 0) {
      currentIndex = 0;
      positionSlides(false);  // instant, no animation
    }
    showHome();
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     HOME ↔ FEED TRANSITIONS
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function enterFeed() {
    resetIdle();
    $home.classList.add('exiting');
    $feed.classList.add('visible');
    $fab.classList.add('visible');
    // After transition completes, fully hide home
    setTimeout(() => {
      $home.classList.add('hidden');
      $home.classList.remove('exiting');
    }, 520);
  }

  function showHome() {
    $home.classList.remove('hidden', 'exiting');
    $feed.classList.remove('visible');
    $fab.classList.remove('visible');
    clearTimeout(idleTimer);
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     BUILD SLIDES FROM DATA
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function buildSlidesFromClientes(clientes) {
    // Flatten: 11 clients × 5 photos = 55 slides
    slides = [];
    clientes.forEach(c => {
      c.imagens.forEach((src, photoIdx) => {
        slides.push({
          src,
          cliente:    c.cliente,
          cidade:     c.cidade,
          categoria:  c.categoria,
          photoIndex: photoIdx,      // 0–4 within client
          totalPhotos: c.imagens.length,
        });
      });
    });

    // Create DOM elements
    $container.innerHTML = '';
    slideEls = [];

    slides.forEach((data, idx) => {
      const el = createSlideEl(data, idx);
      $container.appendChild(el);
      slideEls.push(el);
    });

    // Set initial positions without animation
    positionSlides(false);
    updateUI(0, false);
  }

  function createSlideEl(data, idx) {
    const el = document.createElement('div');
    el.className = 'slide';
    el.dataset.index = idx;

    /* Photo */
    const img = document.createElement('img');
    img.className = 'slide-img';
    img.alt = `${data.cliente} — foto ${data.photoIndex + 1}`;
    img.src = data.src;

    // Error → show placeholder, hide img
    const placeholder = document.createElement('div');
    placeholder.className = 'slide-placeholder';
    placeholder.innerHTML = `<span class="slide-placeholder-mark">VP</span>`;
    img.addEventListener('error', () => {
      img.style.display = 'none';
      placeholder.classList.add('shown');
    });

    /* Gradient overlay */
    const overlay = document.createElement('div');
    overlay.className = 'slide-overlay';

    /* Top bar */
    const topbar = document.createElement('div');
    topbar.className = 'slide-topbar';
    // Pad counter: "01 / 55"
    const counterStr = `${String(idx + 1).padStart(2,'0')} / ${String(slides.length).padStart(2,'0')}`;
    topbar.innerHTML = `
      <div class="slide-logo">Vertical<strong>Parts</strong></div>
      <div class="slide-counter">${counterStr}</div>
    `;

    /* Right progress track */
    const progressTrack = document.createElement('div');
    progressTrack.className = 'slide-progress-track';
    const progressFill = document.createElement('div');
    progressFill.className = 'slide-progress-fill';
    progressTrack.appendChild(progressFill);

    /* Photo dots (which of 5 photos in this client) */
    const dotsEl = document.createElement('div');
    dotsEl.className = 'slide-dots';
    for (let d = 0; d < data.totalPhotos; d++) {
      const dot = document.createElement('div');
      dot.className = 'slide-dot';
      // height varies: inactive 6px, active set by .active class
      dot.style.height = '6px';
      if (d === data.photoIndex) dot.classList.add('active');
      dotsEl.appendChild(dot);
    }

    /* Bottom content */
    const bottom = document.createElement('div');
    bottom.className = 'slide-bottom';

    const categoryEl = document.createElement('div');
    categoryEl.className = 'slide-category';
    categoryEl.textContent = data.categoria;

    const clientEl = document.createElement('div');
    clientEl.className = 'slide-client';
    clientEl.textContent = data.cliente;

    const cityEl = document.createElement('div');
    cityEl.className = 'slide-city';
    cityEl.textContent = data.cidade;

    bottom.appendChild(categoryEl);
    bottom.appendChild(clientEl);
    bottom.appendChild(cityEl);

    /* Assemble */
    el.appendChild(img);
    el.appendChild(placeholder);
    el.appendChild(overlay);
    el.appendChild(topbar);
    el.appendChild(progressTrack);
    el.appendChild(dotsEl);
    el.appendChild(bottom);

    return el;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     POSITION ALL SLIDES
     Called during drag (offset = dragDelta) and on settle
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function positionSlides(animate, dragOffset = 0) {
    const stageH = $stage.offsetHeight;

    slideEls.forEach((el, i) => {
      // Base position relative to current: each step is 100% stage height
      const baseY = (i - currentIndex) * stageH + dragOffset;

      if (animate) {
        el.style.transition = `transform ${SPRING_DUR} ${SPRING}`;
      } else {
        el.style.transition = 'none';
      }

      el.style.transform = `translateY(${baseY}px)`;
    });
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     SET SLIDE — update active state and all UI
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function setSlide(idx, animate) {
    if (idx < 0 || idx >= slides.length) return;

    const prev = currentIndex;
    currentIndex = idx;

    // Remove active from old slide, add to new
    if (slideEls[prev]) {
      slideEls[prev].classList.remove('active');
      // Reset Ken Burns by removing and re-adding (force reflow on next activation)
      const prevImg = slideEls[prev].querySelector('.slide-img');
      if (prevImg) {
        prevImg.style.animation = 'none';
      }
    }

    slideEls[idx].classList.add('active');

    // Re-trigger Ken Burns on new active slide
    const activeImg = slideEls[idx].querySelector('.slide-img');
    if (activeImg) {
      // Force reflow to restart animation
      void activeImg.offsetWidth;
      activeImg.style.animation = '';
    }

    positionSlides(animate);
    updateUI(idx, animate);
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     UPDATE UI ELEMENTS
     Progress bar + text reveal animation
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function updateUI(idx, animate) {
    const total = slides.length;
    const pct   = total > 1 ? (idx / (total - 1)) * 100 : 0;

    // Update progress bar on the ACTIVE slide
    const activeEl = slideEls[idx];
    if (!activeEl) return;

    const fill = activeEl.querySelector('.slide-progress-fill');
    if (fill) fill.style.height = `${pct}%`;

    // Text reveal animation on the new active slide
    if (animate) {
      triggerTextReveal(activeEl);
    } else {
      // No animation — just show text immediately
      const els = activeEl.querySelectorAll('.slide-category, .slide-client, .slide-city');
      els.forEach(e => {
        e.style.opacity = '1';
        e.style.transform = 'none';
      });
    }
  }

  function triggerTextReveal(slideEl) {
    const items = [
      slideEl.querySelector('.slide-category'),
      slideEl.querySelector('.slide-client'),
      slideEl.querySelector('.slide-city'),
    ];

    items.forEach((el, i) => {
      if (!el) return;
      // Reset
      el.style.opacity = '0';
      el.style.transform = 'translateY(24px)';
      el.style.animation = 'none';
      el.classList.remove('reveal-in');

      // Stagger 60ms apart
      setTimeout(() => {
        el.style.animation = '';
        el.classList.add('reveal-in');
        // Clean up after animation completes so it persists
        setTimeout(() => {
          el.style.opacity  = '1';
          el.style.transform = 'none';
        }, 440);
      }, i * 60);
    });
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     TOUCH HANDLERS — TikTok-style drag
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function onTouchStart(e) {
    if (isAnimating) return;
    resetIdle();

    // Only activate in feed
    if (!$feed.classList.contains('visible')) return;
    // Don't intercept FAB / overlay touches
    if ($overlay.classList.contains('open')) return;
    if (e.target.closest('#fab') || e.target.closest('#contact-overlay')) return;

    isDragging   = true;
    touchStartY  = e.touches[0].clientY;
    touchCurY    = touchStartY;

    // Remove transitions during drag — finger must follow with zero lag
    slideEls.forEach(el => { el.style.transition = 'none'; });
  }

  function onTouchMove(e) {
    if (!isDragging) return;
    e.preventDefault();
    resetIdle();

    touchCurY = e.touches[0].clientY;
    let delta = touchCurY - touchStartY;

    const stageH = $stage.offsetHeight;
    const atFirst = currentIndex === 0;
    const atLast  = currentIndex === slides.length - 1;

    // Rubber band at boundaries
    if ((delta > 0 && atFirst) || (delta < 0 && atLast)) {
      delta *= RUBBER_FACTOR;
    }

    // Shift all slides by delta — no transition, instant
    positionSlides(false, delta);
  }

  function onTouchEnd(e) {
    if (!isDragging) return;
    isDragging = false;
    resetIdle();

    const stageH = $stage.offsetHeight;
    const delta  = touchCurY - touchStartY;
    const absDelta = Math.abs(delta);

    const atFirst = currentIndex === 0;
    const atLast  = currentIndex === slides.length - 1;
    const threshold = stageH * SNAP_THRESH;

    isAnimating = true;

    if (absDelta > threshold) {
      if (delta < 0 && !atLast) {
        // Swipe up → next slide
        setSlide(currentIndex + 1, true);
      } else if (delta > 0 && !atFirst) {
        // Swipe down → previous slide
        setSlide(currentIndex - 1, true);
      } else {
        // At boundary — snap back
        positionSlides(true, 0);
      }
    } else {
      // Below threshold — snap back to current
      positionSlides(true, 0);
    }

    // Re-enable interactions after spring completes
    setTimeout(() => { isAnimating = false; }, 520);
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     CONTACT OVERLAY
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function openContact() {
    $overlay.classList.add('open');
    $overlay.setAttribute('aria-hidden', 'false');
    resetIdle();
  }

  function closeContact() {
    $overlay.classList.remove('open');
    $overlay.setAttribute('aria-hidden', 'true');
    resetIdle();
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     EVENT WIRING
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  $homeBtn.addEventListener('click', enterFeed);

  $fab.addEventListener('click', openContact);
  $backBtn.addEventListener('click', closeContact);

  $stage.addEventListener('touchstart', onTouchStart, { passive: true });
  $stage.addEventListener('touchmove',  onTouchMove,  { passive: false });
  $stage.addEventListener('touchend',   onTouchEnd,   { passive: true });

  // Idle timer resets on any touch anywhere
  document.addEventListener('touchstart', resetIdle, { passive: true });

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     INIT — load clientes.json and boot
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  async function init() {
    let clientes = [];

    try {
      const res = await fetch('config/clientes.json');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      clientes = await res.json();
    } catch (err) {
      console.warn('clientes.json não carregado:', err);
      // Fallback: 11 placeholder clients × 5 photos
      clientes = Array.from({ length: 11 }, (_, ci) => ({
        id: `cliente_${ci + 1}`,
        cliente: `Cliente ${String(ci + 1).padStart(2,'0')}`,
        cidade: 'São Paulo, SP',
        categoria: 'Escadas Rolantes',
        imagens: Array.from({ length: 5 }, (_, pi) => ''),
      }));
    }

    buildSlidesFromClientes(clientes);

    // Start idle timer only on home (feed isn't visible yet)
    // Timer is reset on first touch → enterFeed
  }

  init();
</script>
</body>
</html>
